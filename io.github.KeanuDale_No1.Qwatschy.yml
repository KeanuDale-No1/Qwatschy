id: io.github.KeanuDale_No1.Qwatschy
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: Qwatschy

finish-args:
  - --device=dri
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: qwatschy
    buildsystem: simple
    sources:
      - type: dir
        path: .
    build-commands:
      - install -d /app/lib/qwatschy /app/bin
      - cp -r output-flatpak/* /app/lib/qwatschy/
      - ln -sf /app/lib/qwatschy/Qwatschy /app/bin/Qwatschy
      - install -Dm644 VoiceChat.Client/VoiceChat.Client/Assets/qwatschy_logo.png /app/share/icons/hicolor/256x256/apps/io.github.KeanuDale_No1.Qwatschy.png
