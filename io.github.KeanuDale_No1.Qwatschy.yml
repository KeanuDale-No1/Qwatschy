id: io.github.KeanuDale_No1.Qwatschy
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet9

build-options:
  prepend-path: /usr/lib/sdk/dotnet9/bin
  append-ld-library-path: /usr/lib/sdk/dotnet9/lib


command: Qwatschy

finish-args:
  - --device=dri
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --env=DOTNET_ROOT=/app/lib/dotnet

modules:
  - name: dotnet
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/dotnet9/bin/install.sh

  - name: qwatschy
    buildsystem: simple
    build-options:
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: 1
    sources:
      - type: dir
        path: .
    build-commands:
      - install -d /app/lib/qwatschy
      - cp -r output-flatpak/* /app/lib/qwatschy/
      - install -Dm755 /app/lib/qwatschy/Qwatschy /app/bin/Qwatschy
      - install -Dm644 VoiceChat.Client/VoiceChat.Client/Assets/qwatschy_logo.png /app/share/icons/hicolor/256x256/apps/com.qwatschy.Qwatschy.png
    finish-args:
      - --filesystem=home
      - --share=network
      - --socket=wayland
      - --socket=x11
      - --socket=pulseaudio
