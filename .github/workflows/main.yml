name: Auto Build & Release

on:
  push:
    branches:
      - master

env:
  VERSION_FILE: VERSION

jobs:
  build-client:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: win
          - os: ubuntu-latest
            runtime: linux-x64
            suffix: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        run: dotnet tool install -g vpk
        if: runner.os == 'Windows'

      - name: Install Velopack (Linux)
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
        if: runner.os == 'Linux'

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Publish (${{ matrix.suffix }})
        run: |
          dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishDir="${{ github.workspace }}/output"

      - name: Pack (${{ matrix.suffix }})
        run: |
          main_exe="${{ matrix.os == 'windows-latest' && 'Qwatschy.exe' || 'Qwatschy' }}"
          vpk pack --packId Qwatschy --packVersion ${{ steps.version.outputs.VERSION }} --packDir "${{ github.workspace }}/output" --mainExe "$main_exe"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-client-${{ matrix.suffix }}
          path: |
            ${{ github.workspace }}/Qwatschy-*.nupkg
            ${{ github.workspace }}/Qwatschy-*.AppImage
            ${{ github.workspace }}/Qwatschy-*-Setup.exe

  build-deb:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Publish Linux
        run: |
          dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r linux-x64 --self-contained true -p:PublishDir="${{ github.workspace }}/output"

      - name: Create DEB Package
        run: |
          mkdir -p "${{ github.workspace }}/deb-root/usr/bin"
          mkdir -p "${{ github.workspace }}/deb-root/usr/lib/qwatschy"
          mkdir -p "${{ github.workspace }}/deb-root/DEBIAN"
          cp -r "${{ github.workspace }}/output/"* "${{ github.workspace }}/deb-root/usr/lib/qwatschy/"
          echo '#!/bin/bash' > "${{ github.workspace }}/deb-root/usr/bin/qwatschy"
          echo 'exec /usr/lib/qwatschy/Qwatschy "$@"' >> "${{ github.workspace }}/deb-root/usr/bin/qwatschy"
          chmod +x "${{ github.workspace }}/deb-root/usr/bin/qwatschy"
          printf 'Package: qwatschy\nVersion: 0.1.0-beta\nSection: net\nPriority: optional\nArchitecture: amd64\nDepends: libc6\nMaintainer: Qwatschy\nDescription: Cross-platform voice chat application\n' > "${{ github.workspace }}/deb-root/DEBIAN/control"
          dpkg-deb --build "${{ github.workspace }}/deb-root" "${{ github.workspace }}/Qwatschy.deb"

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-deb
          path: ${{ github.workspace }}/Qwatschy.deb

  build-flatpak:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Flatpak
        run: sudo apt-get update && sudo apt-get install -y flatpak flatpak-builder

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Publish Linux
        run: |
          dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r linux-x64 --self-contained true -p:PublishDir="${{ github.workspace }}/output"

      - name: Create App Archive
        run: cd "${{ github.workspace }}/output" && tar -czvf "${{ github.workspace }}/Qwatschy-linux.tar.gz" .

      - name: Create Flatpak Structure
        run: |
          mkdir -p "${{ github.workspace }}/build-dir"
          echo '{"app-id":"com.qwatschy.Qwatschy","runtime":"org.freedesktop.Platform","runtime-version":"23.08","sdk":"org.freedesktop.Sdk","command":"Qwatschy","finish-args":["--share=ipc","--socket=x11","--socket=wayland","--device=dri","--share=network","--filesystem=home"],"modules":[{"name":"qwatschy","buildsystem":"simple","build-commands":["install -Dm755 Qwatschy /app/bin/Qwatschy","install -Dm644 qwatschy.desktop /app/share/applications/com.qwatschy.Qwatschy.desktop"],"sources":[{"type":"archive","path":"../Qwatschy-linux.tar.gz"},{"type":"file","path":"qwatschy.desktop"}]}]}' > "${{ github.workspace }}/build-dir/com.qwatschy.Qwatschy.json"
          printf '[Desktop Entry]\nName=Qwatschy\nComment=Cross-platform voice chat application\nExec=Qwatschy\nIcon=com.qwatschy.Qwatschy\nTerminal=false\nType=Application\nCategories=Network;Chat;\n' > "${{ github.workspace }}/build-dir/qwatschy.desktop"

      - name: Setup Flatpak User Mode
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo || true
          flatpak --user install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Build Flatpak
        run: |
          cd "${{ github.workspace }}"
          flatpak-builder --user --force-clean --repo=repo build-dir/com.qwatschy.Qwatschy.json
          flatpak --user build-bundle repo Qwatschy.flatpak com.qwatschy.Qwatschy

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-flatpak
          path: ${{ github.workspace }}/Qwatschy.flatpak

  build-server:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: win
          - os: ubuntu-latest
            runtime: linux-x64
            suffix: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Publish Server (${{ matrix.suffix }})
        run: |
          dotnet publish VoiceChat.Api/VoiceChat.Api.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -o "${{ github.workspace }}/output"

      - name: Create Server ZIP (${{ matrix.suffix }})
        if: runner.os == 'Linux'
        run: cd "${{ github.workspace }}/output" && zip -r "${{ github.workspace }}/Qwatschy-Server-${{ matrix.suffix }}.zip" . -x "*/createdump"

      - name: Create Server ZIP (${{ matrix.suffix }})
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem -Path "${{ github.workspace }}/output/createdump.exe" -ErrorAction SilentlyContinue | Remove-Item
          Compress-Archive -Path "${{ github.workspace }}/output/*" -DestinationPath "${{ github.workspace }}/Qwatschy-Server-${{ matrix.suffix }}.zip"

      - name: Upload Server Artifact (${{ matrix.suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: release-server-${{ matrix.suffix }}
          path: ${{ github.workspace }}/Qwatschy-Server-${{ matrix.suffix }}.zip

  release:
    needs: [build-client, build-deb, build-flatpak, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: artifacts/**/*
