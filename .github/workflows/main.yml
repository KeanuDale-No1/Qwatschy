name: Auto Build & Release

on:
  push:
    branches:
      - master

env:
  VERSION_FILE: VERSION

jobs:
  build-client:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: win
          - os: ubuntu-latest
            runtime: linux-x64
            suffix: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Velopack (Windows)
        run: dotnet tool install -g vpk
        if: runner.os == 'Windows'

      - name: Install Velopack (Linux)
        run: dotnet tool install -g vpk
        if: runner.os == 'Linux'

      - name: Add to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish (${{ matrix.suffix }})
        run: |
          dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishDir="${{ github.workspace }}/output"

      - name: Pack (${{ matrix.suffix }})
        run: |
          main_exe="${{ matrix.os == 'windows-latest' && 'Qwatschy.exe' || 'Qwatschy' }}"
          vpk pack -o "${{ github.workspace }}" --packId Qwatschy --packVersion ${{ steps.version.outputs.VERSION }} --packDir "${{ github.workspace }}/output" --mainExe "$main_exe"
          
          # Rename files to remove version from name
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv Qwatschy-*-Setup.exe Qwatschy-Setup.exe 2>/dev/null || true
            mv Qwatschy-*-full.nupkg Qwatschy-win.nupkg 2>/dev/null || true
          else
            mv Qwatschy-*.AppImage Qwatschy.AppImage 2>/dev/null || true
            mv Qwatschy-*-linux-full.nupkg Qwatschy-linux.nupkg 2>/dev/null || true
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-client-${{ matrix.suffix }}
          path: |
            ${{ github.workspace }}/Qwatschy-win.nupkg
            ${{ github.workspace }}/Qwatschy-linux.nupkg
            ${{ github.workspace }}/Qwatschy.AppImage
            ${{ github.workspace }}/Qwatschy-Setup.exe

  build-deb:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish Linux
        run: |
          dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r linux-x64 --self-contained true -p:PublishDir="${{ github.workspace }}/output"

      - name: Create DEB Package
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          
          mkdir -p "${{ github.workspace }}/deb-root/DEBIAN"
          mkdir -p "${{ github.workspace }}/deb-root/usr/bin"
          mkdir -p "${{ github.workspace }}/deb-root/usr/lib/qwatschy"
          mkdir -p "${{ github.workspace }}/deb-root/usr/share/applications"
          mkdir -p "${{ github.workspace }}/deb-root/usr/share/icons/hicolor/256x256/apps"
          
          cp -r "${{ github.workspace }}/output/"* "${{ github.workspace }}/deb-root/usr/lib/qwatschy/"
          
          cat > "${{ github.workspace }}/deb-root/DEBIAN/control" << EOF
          Package: qwatschy
          Version: $version
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libasound2, libglib2.0-0
          Maintainer: Qwatschy
          Description: Cross-platform voice chat application
           Qwatschy is a modern voice chat application with real-time
           audio and text chat capabilities.
          EOF
          
          cat > "${{ github.workspace }}/deb-root/usr/bin/qwatschy" << 'WRAPPER'
          #!/bin/bash
          exec /usr/lib/qwatschy/Qwatschy "$@"
          WRAPPER
          chmod +x "${{ github.workspace }}/deb-root/usr/bin/qwatschy"
          
          cat > "${{ github.workspace }}/deb-root/usr/share/applications/io.github.KeanuDale_No1.Qwatschy.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Qwatschy
          Comment=Cross-platform voice chat application
          Exec=/usr/lib/qwatschy/Qwatschy
          Icon=io.github.KeanuDale_No1.Qwatschy
          Terminal=false
          Type=Application
          Categories=Network;Chat;
          DESKTOP
          
          cp VoiceChat.Client/VoiceChat.Client/Assets/qwatschy_logo.png "${{ github.workspace }}/deb-root/usr/share/icons/hicolor/256x256/apps/io.github.KeanuDale_No1.Qwatschy.png" 2>/dev/null || true
          
          dpkg-deb --build "${{ github.workspace }}/deb-root" "${{ github.workspace }}/Qwatschy-deb.deb"
        shell: bash

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-deb
          path: Qwatschy-deb.deb

  build-flatpak:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish Linux (Flatpak)
        run: |
          dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r linux-x64 --self-contained false -p:PublishDir="${{ github.workspace }}/output-flatpak"

      - name: Create App Archive
        run: |
          cd "${{ github.workspace }}/output-flatpak"
          zip -r "${{ github.workspace }}/Qwatschy-linux.zip" .

      - name: Create Flatpak Bundle
        run: |
          flatpak create-user --force --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo io.github.KeanuDale_No1.Qwatschy "${{ github.workspace }}/output-flatpak"

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-flatpak
          path: Qwatschy.flatpak

  build-server:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: win
          - os: ubuntu-latest
            runtime: linux-x64
            suffix: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish Server (${{ matrix.suffix }})
        run: |
          dotnet publish VoiceChat.Api/VoiceChat.Api.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -o "${{ github.workspace }}/output"

      - name: Create Server ZIP (${{ matrix.suffix }})
        if: runner.os == 'Linux'
        run: |
          cd "${{ github.workspace }}/output"
          zip -r "${{ github.workspace }}/Qwatschy-Server-${{ matrix.suffix }}.zip" . -x "*/createdump"

      - name: Create Server ZIP (${{ matrix.suffix }})
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem -Path "${{ github.workspace }}/output/createdump.exe" -ErrorAction SilentlyContinue | Remove-Item
          Compress-Archive -Path "${{ github.workspace }}/output/*" -DestinationPath "${{ github.workspace }}/Qwatschy-Server-${{ matrix.suffix }}.zip"

      - name: Upload Server Artifact (${{ matrix.suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: release-server-${{ matrix.suffix }}
          path: ${{ github.workspace }}/Qwatschy-Server-${{ matrix.suffix }}.zip

  release:
    needs: [build-client, build-deb, build-flatpak, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: artifacts/**/*
