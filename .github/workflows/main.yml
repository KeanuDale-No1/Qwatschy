name: Auto Build & Release

on:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: win
          - os: ubuntu-latest
            runtime: linux-x64
            suffix: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        run: dotnet tool install -g vpk
        if: runner.os == 'Windows'

      - name: Install Velopack (Linux)
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
        if: runner.os == 'Linux'

      - name: Generate Version
        id: version
        run: |
          date=$(date +'%Y.%m.%d')
          version="$date.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Publish (${{ matrix.suffix }})
        run: dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishDir=output/${{ matrix.suffix }}/

      - name: Pack (${{ matrix.suffix }})
        run: vpk pack --packId Qwatschy.Client.Desktop --packVersion ${{ steps.version.outputs.VERSION }} --packDir output/${{ matrix.suffix }}/ --mainExe Qwatschy.Client.Desktop.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: |
            **/*.nupkg
            **/RELEASES

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Version
        id: version
        run: |
          date=$(date +'%Y.%m.%d')
          version="$date.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: artifacts/**/*