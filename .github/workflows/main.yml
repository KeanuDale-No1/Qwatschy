name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 📥 Repo holen
      - name: Checkout
        uses: actions/checkout@v4

      # ⚙️ .NET installieren
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 🧰 Velopack installieren
      - name: Install Velopack
        run: dotnet tool install -g vpk

      # 🔁 Version aus Tag holen (v1.0.0 -> 1.0.0)
      - name: Extract version
        id: version
        run: |
          echo VERSION=${GITHUB_REF_NAME#v} >> $GITHUB_OUTPUT

      # 🪟 ================= WINDOWS =================
      - name: Publish Windows
        run: dotnet publish VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r win-x64 --self-contained true

      - name: Pack Windows
        run: |
          vpk pack --id erwarfs --version ${{ steps.version.outputs.VERSION }} ^
          --packDir VoiceChat.Client.Desktop/bin/Release/net8.0/win-x64/publish ^
          --mainExe erwarfs.exe

      # 🐧 ================= LINUX =================
      - name: Publish Linux
        run: dotnet publish VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r linux-x64 --self-contained true

      - name: Pack Linux
        run: |
          vpk pack --id erwarfs --version ${{ steps.version.outputs.VERSION }} ^
          --packDir VoiceChat.Client.Desktop/bin/Release/net8.0/linux-x64/publish ^
          --mainExe erwarfs

      # 🚀 Release erstellen + Dateien hochladen
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.nupkg
            **/RELEASES
            **/*Setup.exe
