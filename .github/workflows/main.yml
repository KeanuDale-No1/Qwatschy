name: Auto Build & Release

on:
  push:
    branches:
      - master

env:
  VERSION_FILE: VERSION

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: win
          - os: ubuntu-latest
            runtime: linux-x64
            suffix: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        run: dotnet tool install -g vpk
        if: runner.os == 'Windows'

      - name: Install Velopack (Linux)
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
        if: runner.os == 'Linux'

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish (${{ matrix.suffix }})
        run: dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r ${{ matrix.runtime }} --self-contained true

      - name: Pack (${{ matrix.suffix }})
        run: |
          main_exe="${{ matrix.os == 'windows-latest' && 'Qwatschy.exe' || 'Qwatschy' }}"
          pack_dir="VoiceChat.Client/VoiceChat.Client.Desktop/bin/Release/net10.0/${{ matrix.runtime }}/publish"
          vpk pack --packId Qwatschy --packVersion ${{ steps.version.outputs.VERSION }} --packDir "$pack_dir" --mainExe "$main_exe"
          mv Qwatschy-*.nupkg Qwatschy-${{ matrix.suffix }}.nupkg
          mv Qwatschy-${{ matrix.suffix }}-Setup.exe Qwatschy-Setup-${{ matrix.suffix }}.exe
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: |
            **/*.nupkg
            **/RELEASES

  build-server:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            suffix: win
          - os: ubuntu-latest
            runtime: linux-x64
            suffix: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish Server (${{ matrix.suffix }})
        run: dotnet publish VoiceChat.Api/VoiceChat.Api.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -o output/${{ matrix.suffix }}/

      - name: Create Server ZIP (${{ matrix.suffix }})
        if: runner.os == 'Linux'
        run: |
          cd output
          zip -r Qwatschy-Server-${{ matrix.suffix }}.zip ${{ matrix.suffix }}/ -x "*/createdump"
          mv Qwatschy-Server-${{ matrix.suffix }}.zip ../
        shell: bash

      - name: Create Server ZIP (${{ matrix.suffix }})
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem -Path output/${{ matrix.suffix }}/createdump.exe -ErrorAction SilentlyContinue | Remove-Item
          Compress-Archive -Path output/${{ matrix.suffix }}/* -DestinationPath Qwatschy-Server-${{ matrix.suffix }}.zip

      - name: Upload Server Artifact (${{ matrix.suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: release-server-${{ matrix.suffix }}
          path: Qwatschy-Server-${{ matrix.suffix }}.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish Linux
        run: dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r linux-x64 --self-contained true -p:PublishDir=output/linux/

      - name: Pack Linux (.nupkg)
        run: |
          cd output/linux
          vpk pack --packId Qwatschy --packVersion ${{ steps.version.outputs.VERSION }} --packDir . --mainExe Qwatschy
          mv Qwatschy-*.nupkg Qwatschy-linux.nupkg
        shell: bash

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: output/linux/Qwatschy-linux.nupkg

  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish Linux
        run: dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r linux-x64 --self-contained true -p:PublishDir=output/linux/

      - name: Create Linux ZIP
        run: |
          cd output
          zip -r Qwatschy-linux.zip linux/
          mv Qwatschy-linux.zip ../
        shell: bash

      - name: Install Flatpak
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Build Flatpak
        run: flatpak-builder --force-clean --user --install-deps-from=flathub build-dir com.qwatschy.Qwatschy.json

      - name: Create Flatpak Bundle
        run: flatpak build-bundle Qwatschy.flatpak com.qwatschy.Qwatschy

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-flatpak
          path: Qwatschy.flatpak

  release:
    needs: [build, build-server, build-linux, build-flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read Version
        id: version
        run: |
          base_version=$(cat ${{ env.VERSION_FILE }})
          version="$base_version.${{ github.run_number }}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: artifacts/**/*
