name: Auto Build & Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ⚙️ .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 🧰 Velopack
      - name: Install Velopack
        run: dotnet tool install -g vpk

      # 🔢 Auto Version erzeugen
      - name: Generate Version
        id: version
        run: |
          $date = Get-Date -Format "yyyy.M.d"
          $version = "$date.${{ github.run_number }}"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      # 🪟 WINDOWS BUILD
      - name: Publish Windows
        run: dotnet publish VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r win-x64 --self-contained true

      - name: Pack Windows
        run: |
          vpk pack --id Qwatschy.Client.Desktop --version ${{ steps.version.outputs.VERSION }} ^
          --packDir VoiceChat.Client.Desktop/bin/Release/net8.0/win-x64/publish ^
          --mainExe Qwatschy.Client.Desktop.exe

      # 🐧 LINUX BUILD
      - name: Publish Linux
        run: dotnet publish VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release -r linux-x64 --self-contained true

      - name: Pack Linux
        run: |
          vpk pack --id Qwatschy.Client.Desktop --version ${{ steps.version.outputs.VERSION }} ^
          --packDir VoiceChat.Client.Desktop/bin/Release/net8.0/linux-x64/publish ^
          --mainExe Qwatschy.Client.Desktop

      # 🚀 Release erstellen
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: |
            **/*.nupkg
            **/RELEASES
            **/*Setup.exe